<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Herb — The Inner Me</title>
<style>
  :root{
    --paper:#fbf7ef; --ink:#2e2a24; --muted:#6f675b; --line:#e7ddcc;
    --gold:#d9a534; --goldsoft:#faf1d8; --goldline:#e9c96a; --userbg:#efe7d6; --crisis:#c0392b;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    display:flex;flex-direction:column;height:100dvh;-webkit-font-smoothing:antialiased}
  header{background:#fff;border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:12px}
  .seal{width:38px;height:38px;border-radius:50%;background:var(--gold);color:#3a2c05;font-weight:700;
    display:flex;align-items:center;justify-content:center;font-size:14px;letter-spacing:.02em}
  header h1{font-size:17px;margin:0;font-weight:600}
  header p{font-size:12px;color:var(--muted);margin:2px 0 0}
  header .back{margin-left:auto;font-size:13px;color:var(--muted);text-decoration:none;border:1px solid var(--line);
    padding:7px 13px;border-radius:999px}
  .strip{background:#fbf3f0;border-bottom:1px solid #eeddd8;color:#7a4a3f;font-size:11.5px;line-height:1.4;
    padding:6px 16px;text-align:center}
  .strip a{color:var(--crisis);font-weight:600;text-decoration:none}
  .log{flex:1;overflow-y:auto;padding:18px 14px;max-width:680px;width:100%;margin:0 auto}
  .turn{display:flex;margin:12px 0}
  .turn.user{justify-content:flex-end}
  .bubble{max-width:84%;padding:12px 16px;border-radius:16px;font-size:16px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word}
  .user .bubble{background:var(--userbg);border-bottom-right-radius:5px}
  .coach .bubble{background:#fff;border:1px solid #ece2cf;border-bottom-left-radius:5px}
  .coach .bubble.crisis{border-color:var(--goldline);border-left:4px solid var(--crisis);background:#fff6f4}
  .who{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#a08a52;margin-bottom:6px}
  .bubble a{color:var(--crisis)}
  .doors{display:flex;gap:10px;flex-wrap:wrap;margin:2px 0 6px 2px}
  .door{border:1px solid var(--goldline);background:var(--goldsoft);border-radius:999px;padding:9px 16px;
    font-size:14px;font-family:inherit;color:var(--ink);cursor:pointer}
  .door.solid{background:var(--gold);border-color:var(--gold);font-weight:600}
  .typing{color:var(--muted);font-style:italic;font-size:14px;padding:4px 6px}
  .composer{border-top:1px solid var(--line);background:#fff;padding:10px 12px}
  .composer .row{max-width:680px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
  textarea{flex:1;resize:none;border:1px solid var(--line);border-radius:14px;padding:11px 14px;font-size:16px;
    font-family:inherit;max-height:140px;background:#fffef9;color:var(--ink)}
  .send{border:none;background:var(--gold);color:#3a2c05;font-weight:700;border-radius:14px;padding:0 18px;height:44px;
    font-size:15px;font-family:inherit;cursor:pointer}
  .send:disabled{opacity:.5;cursor:default}
</style>
</head>
<body>
  <header>
    <div class="seal">Herb</div>
    <div><h1>Coach Herb</h1><p>Leadership &amp; growth coaching · built on Dr. Fenner's method</p></div>
    <a class="back" href="index.html">← Home</a>
  </header>
  <div class="strip">A guided reflection — not therapy, medical care, or crisis support. In crisis or thinking about harming yourself, call or text <a href="tel:988">988</a> (U.S.) or your local emergency number.</div>

  <div class="log" id="log"></div>

  <div class="composer">
    <div class="row">
      <textarea id="input" rows="1" placeholder="Say it however it comes — one honest line is enough."></textarea>
      <button class="send" id="send">Send</button>
    </div>
  </div>

<script>
(function(){
  var log = document.getElementById('log');
  var input = document.getElementById('input');
  var sendBtn = document.getElementById('send');
  var history = [];      // [{role:'user'|'assistant', content:'...'}]
  var busy = false;

  var CRISIS = /\b(?:suicid(?:e|al)|kill(?:ing)?\s+myself|end(?:ing)?\s+my\s+life|end\s+it\s+all|take\s+my\s+(?:own\s+)?life|want(?:ing)?\s+to\s+die|wanna\s+die|do(?:n['’]?t| not)\s+want\s+to\s+(?:live|be\s+here|be\s+alive|exist)|better\s+off\s+dead|no\s+reason\s+to\s+(?:live|be\s+here|go\s+on)|can['’]?t\s+go\s+on|hurt(?:ing)?\s+myself|harm(?:ing)?\s+myself|self[-\s]?harm|cut(?:ting)?\s+myself|overdos(?:e|ing))/i;

  var CRISIS_HTML =
    '<b>Let’s pause for a moment.</b><br><br>' +
    'What you just named sounds heavy and real, and I don’t want to hand you a coaching answer on top of it. I’m a guided reflection here — not a person who can keep you safe in an emergency, and you deserve someone who can.<br><br>' +
    'If you’re thinking about harming yourself or ending your life, please reach a real person right now — any time, day or night:<br><br>' +
    '<b>Call or text <a href="tel:988">988</a></b> — the U.S. Suicide &amp; Crisis Lifeline.<br>In immediate danger, call <a href="tel:911">911</a>.<br><br>' +
    'Outside the U.S., your local emergency number or <a href="https://findahelpline.com" target="_blank" rel="noopener">findahelpline.com</a> can connect you to someone.<br><br>' +
    'I’m not going anywhere — this will still be here when you’re ready. Reaching out for help is not a burden. It is the bravest, most honest thing you can do right now.';

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function addUser(text){
    var t = document.createElement('div'); t.className = 'turn user';
    t.innerHTML = '<div class="bubble">'+esc(text)+'</div>';
    log.appendChild(t); scrollDown();
  }

  function addCoach(html, isCrisis){
    var t = document.createElement('div'); t.className = 'turn coach';
    t.innerHTML = '<div class="bubble'+(isCrisis?' crisis':'')+'"><div class="who">Coach Herb</div>'+html+'</div>';
    log.appendChild(t); scrollDown();
    return t;
  }

  function addDoors(){
    var d = document.createElement('div'); d.className = 'doors';
    d.innerHTML = '<button class="door solid" data-say="I want to move forward — what is one step I can take?">Move forward</button>' +
                  '<button class="door" data-say="Let’s go deeper — I want to stay with this a little longer.">Go deeper</button>';
    log.appendChild(d); scrollDown();
    d.querySelectorAll('.door').forEach(function(b){
      b.addEventListener('click', function(){
        if(busy) return;
        d.remove();
        send(b.getAttribute('data-say'));
      });
    });
  }

  function coachTextToHtml(text){
    return esc(text).replace(/\n{2,}/g,'<br><br>').replace(/\n/g,'<br>');
  }

  function scrollDown(){ log.scrollTop = log.scrollHeight; }

  function setBusy(state){
    busy = state; sendBtn.disabled = state;
  }

  var typingEl = null;
  function showTyping(){
    typingEl = document.createElement('div'); typingEl.className = 'typing'; typingEl.textContent = 'Coach Herb is listening…';
    log.appendChild(typingEl); scrollDown();
  }
  function hideTyping(){ if(typingEl){ typingEl.remove(); typingEl = null; } }

  function send(text){
    text = (text || input.value || '').trim();
    if(!text || busy) return;
    input.value=''; autoGrow();
    addUser(text);

    if(CRISIS.test(text)){
      addCoach(CRISIS_HTML, true);
      return; // do not send crisis disclosures to the model; offer the human off-ramp first
    }

    history.push({role:'user', content:text});
    setBusy(true); showTyping();

    fetch('/.netlify/functions/coach', {
      method:'POST',
      headers:{'content-type':'application/json'},
      body: JSON.stringify({ messages: history })
    })
    .then(function(r){ return r.json().then(function(j){ return {ok:r.ok, j:j}; }); })
    .then(function(res){
      hideTyping(); setBusy(false);
      if(!res.ok || !res.j || !res.j.reply){
        addCoach(esc((res.j && res.j.error) || 'Something went wrong reaching me. Please try again.'), false);
        return;
      }
      history.push({role:'assistant', content:res.j.reply});
      addCoach(coachTextToHtml(res.j.reply), false);
      addDoors();
    })
    .catch(function(){
      hideTyping(); setBusy(false);
      addCoach('I couldn’t be reached just now — please try again in a moment.', false);
    });
  }

  function autoGrow(){ input.style.height='auto'; input.style.height = Math.min(input.scrollHeight,140)+'px'; }
  input.addEventListener('input', autoGrow);
  input.addEventListener('keydown', function(e){
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', function(){ send(); });

  // Opening greeting (not sent to the model — it's the doorway)
  addCoach('I’m here, and I’ve got time for you. What’s sitting on you today? Say it however it comes — one honest line is enough, and we’ll take it from there together.', false);
  input.focus();
})();
</script>
</body>
</html>
